<header class="main-header animate-fade-in-down">
    <div class="container nav-container">
        
        <a href="/" class="logo">
            LFAF<span>TECH</span>
        </a>

        <nav class="nav-links">
            <a href="/" class="nav-link">Inicio</a>
            <a href="#" onclick="document.querySelector('.hub-grid').scrollIntoView({behavior: 'smooth'}); return false;" class="nav-link">Soluciones</a>
            <a href="#" onclick="document.querySelector('.price-card').scrollIntoView({behavior: 'smooth'}); return false;" class="nav-link">Planes</a>
        </nav>

        <div style="display: flex; align-items: center; gap: 1rem;">
            <% if (typeof user !== 'undefined' && user) { %>
                <div style="display: flex; flex-direction: column; align-items: flex-end; line-height: 1.2; margin-right: 0.5rem;" class="hide-mobile">
                    <span style="font-size: 0.75rem; color: var(--text-muted);">Hola,</span>
                    <span style="font-weight: 700; font-size: 0.9rem;"><%= user.username %></span>
                </div>
                <a href="/dashboard" class="btn btn-primary">
                    <i class="fas fa-columns"></i> <span class="hide-mobile">Mi Panel</span>
                </a>
            <% } else { %>
                <a href="/login" class="nav-link" style="font-weight: 600; font-size: 0.95rem;">
                    Entrar
                </a>
                <a href="/register" class="btn btn-primary" style="padding: 0.6rem 1.2rem;">
                    Crear Cuenta
                </a>
            <% } %>
        </div>

    </div>
</header>

<style>
    @media (max-width: 768px) {
        .hide-mobile { display: none !important; }
    }
</style>
