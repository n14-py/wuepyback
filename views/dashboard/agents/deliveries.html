<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Flota | LFAF Tech</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-slate-900 text-white hidden md:block flex-shrink-0">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-blue-400">LFAF Tech</h1>
            </div>
            <nav class="mt-6">
                <a href="/dashboard/agents" class="flex items-center px-6 py-3 text-gray-300 hover:bg-slate-800 transition">
                    <i class="fas fa-robot mr-3"></i> Mi Agente IA
                </a>
                <a href="/dashboard/agents/orders" class="flex items-center px-6 py-3 text-gray-300 hover:bg-slate-800 transition">
                    <i class="fas fa-shopping-bag mr-3"></i> Pedidos
                </a>
                <a href="/dashboard/agents/products" class="flex items-center px-6 py-3 text-gray-300 hover:bg-slate-800 transition">
                    <i class="fas fa-box mr-3"></i> Catálogo
                </a>
                <a href="/dashboard/agents/deliveries" class="flex items-center px-6 py-3 bg-blue-600 text-white transition">
                    <i class="fas fa-motorcycle mr-3"></i> Repartidores
                </a>
                <a href="/dashboard/agents/config" class="flex items-center px-6 py-3 text-gray-300 hover:bg-slate-800 transition">
                    <i class="fas fa-cog mr-3"></i> Configuración
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-4 md:p-8 overflow-y-auto">
            <div class="max-w-5xl mx-auto">
                
                <div class="flex flex-col md:flex-row justify-between items-center mb-8">
                    <div>
                        <h2 class="text-3xl font-bold text-gray-800">Gestión de Repartidores</h2>
                        <p class="text-gray-500">Registra a tus choferes para enviarles las fichas de entrega automáticamente.</p>
                    </div>
                    <button onclick="openDriverModal()" class="mt-4 md:mt-0 bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition flex items-center">
                        <i class="fas fa-user-plus mr-2"></i> Añadir Repartidor
                    </button>
                </div>

                <div id="drivers-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="col-span-full py-20 text-center text-gray-400">
                        <i class="fas fa-spinner fa-spin fa-2x mb-2"></i>
                        <p>Cargando flota de repartidores...</p>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="driverModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="text-xl font-bold" id="modalTitle">Nuevo Repartidor</h3>
                <button onclick="closeDriverModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>

            <form id="driverForm" class="p-6 space-y-4">
                <input type="hidden" id="driverId">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nombre Completo</label>
                    <input type="text" id="driverName" required placeholder="Ej: Juan Pérez" 
                        class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Número de WhatsApp</label>
                    <input type="text" id="driverPhone" required placeholder="Ej: 0981123456" 
                        class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <p class="text-[10px] text-gray-400 mt-1 italic">Incluye el código de área sin el signo +. Ejemplo: 595981...</p>
                </div>

                <div class="flex items-center p-3 bg-gray-50 rounded-xl">
                    <input type="checkbox" id="driverActive" checked class="h-5 w-5 text-blue-600 rounded">
                    <label for="driverActive" class="ml-3 text-sm font-bold text-gray-700">Repartidor Activo (Disponible)</label>
                </div>

                <div class="pt-4 flex flex-col space-y-2">
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg">
                        Guardar Repartidor
                    </button>
                    <button type="button" onclick="closeDriverModal()" class="w-full text-gray-400 font-bold py-2">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadDrivers);

        async function loadDrivers() {
            try {
                const res = await fetch('/api/agent-deliveries');
                const data = await res.json();
                renderDrivers(data.repartidores);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderDrivers(drivers) {
            const grid = document.getElementById('drivers-grid');
            
            if (drivers.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full bg-white p-12 rounded-2xl border border-dashed border-gray-300 text-center">
                        <div class="h-16 w-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-400">
                            <i class="fas fa-motorcycle text-2xl"></i>
                        </div>
                        <h4 class="font-bold text-gray-700">No hay repartidores registrados</h4>
                        <p class="text-sm text-gray-400 mt-1">Agrega a tus choferes para poder asignarles pedidos.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = drivers.map(d => `
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 relative group">
                    <div class="flex items-center mb-4">
                        <div class="h-12 w-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xl font-bold">
                            ${d.name.charAt(0)}
                        </div>
                        <div class="ml-4">
                            <h4 class="font-bold text-gray-800">${d.name}</h4>
                            <p class="text-xs text-gray-500"><i class="fab fa-whatsapp text-green-500"></i> ${d.phone}</p>
                        </div>
                    </div>

                    <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                        <span class="px-2 py-1 rounded-md text-[10px] font-black uppercase ${d.active ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                            ${d.active ? 'Disponible' : 'No disponible'}
                        </span>
                        <div class="space-x-1">
                            <button onclick='editDriver(${JSON.stringify(d)})' class="p-2 text-gray-400 hover:text-blue-500 transition">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteDriver('${d._id}')" class="p-2 text-gray-400 hover:text-red-500 transition">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- MODAL LÓGICA ---

        function openDriverModal() {
            document.getElementById('driverForm').reset();
            document.getElementById('driverId').value = '';
            document.getElementById('modalTitle').innerText = 'Nuevo Repartidor';
            document.getElementById('driverModal').classList.remove('hidden');
        }

        function closeDriverModal() {
            document.getElementById('driverModal').classList.add('hidden');
        }

        function editDriver(d) {
            openDriverModal();
            document.getElementById('modalTitle').innerText = 'Editar Repartidor';
            document.getElementById('driverId').value = d._id;
            document.getElementById('driverName').value = d.name;
            document.getElementById('driverPhone').value = d.phone;
            document.getElementById('driverActive').checked = d.active;
        }

        // --- ACCIONES (POST/PUT/DELETE) ---

        document.getElementById('driverForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('driverId').value;
            
            const body = {
                name: document.getElementById('driverName').value,
                phone: document.getElementById('driverPhone').value,
                active: document.getElementById('driverActive').checked
            };

            const url = id ? `/api/agent-deliveries/${id}` : '/api/agent-deliveries';
            const method = id ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                closeDriverModal();
                loadDrivers();
            } else {
                const data = await res.json();
                alert(data.msg || 'Error al guardar.');
            }
        });

        async function deleteDriver(id) {
            if (!confirm('¿Seguro que quieres eliminar a este repartidor?')) return;
            const res = await fetch(`/api/agent-deliveries/${id}`, { method: 'DELETE' });
            if (res.ok) {
                loadDrivers();
            } else {
                const data = await res.json();
                alert(data.msg || 'No se pudo eliminar.');
            }
        }
    </script>
</body>
</html>
