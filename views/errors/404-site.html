<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio No Encontrado</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; height: 100vh; background: #f4f6f9; text-align: center; font-family: sans-serif; }
        .error-card { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-width: 500px; }
        h1 { color: #dc3545; font-size: 4rem; margin: 0; }
        p { color: #666; font-size: 1.1rem; margin: 1rem 0 2rem; }
        .btn { background: #3498db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="error-card">
        <h1>404</h1>
        <h2>¡Ups! Este sitio no existe.</h2>
        <p>Parece que la tienda <strong><%= typeof domain !== 'undefined' ? domain : 'buscada' %></strong> aún no ha sido creada o ha sido eliminada.</p>
        <a href="http://localhost:3000" class="btn">Crear este sitio en LFAFTECH</a>
    </div>
</body>
</html>
