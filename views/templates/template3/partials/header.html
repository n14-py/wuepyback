<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: { 
                    sans: ['Inter', 'sans-serif'],
                    display: ['Archivo', 'sans-serif']
                },
                colors: { 
                    brand: '<%= site.primaryColor %>',
                    dark: '#1a1a1a'
                },
                boxShadow: {
                    'hard': '4px 4px 0px 0px rgba(0,0,0,1)',
                    'hard-sm': '2px 2px 0px 0px rgba(0,0,0,1)',
                }
            }
        }
    }
</script>
<style>
    .text-brand { color: <%= site.primaryColor %>; }
    .bg-brand { background-color: <%= site.primaryColor %>; }
    .border-brand { border-color: <%= site.primaryColor %>; }
    
    /* Bordes y Sombras Estilo Bold */
    .btn-bold {
        background-color: <%= site.primaryColor %>;
        color: white;
        border: 2px solid black;
        box-shadow: 4px 4px 0px 0px black;
        transition: all 0.2s;
    }
    .btn-bold:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px 0px black;
    }
    .btn-bold:active {
        transform: translate(4px, 4px);
        box-shadow: 0px 0px 0px 0px black;
    }
    
    .card-bold {
        background: white;
        border: 2px solid black;
        box-shadow: 4px 4px 0px 0px rgba(0,0,0,0.1);
        transition: transform 0.2s;
    }
    .card-bold:hover {
        transform: translateY(-2px);
        box-shadow: 6px 6px 0px 0px rgba(0,0,0,0.2);
    }
</style>

<div x-data="{ mobileMenu: false, searchOpen: false }">

    <div class="bg-black text-white text-xs font-bold py-2 border-b-2 border-black font-display tracking-widest uppercase">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="bg-brand text-black px-1">NUEVO</span>
                <span>Envíos a todo el país 🚀</span>
            </div>
            <div class="flex gap-4">
                <% if(site.contact.phone) { %> <span><i class="fas fa-phone-alt mr-1"></i> <%= site.contact.phone %></span> <% } %>
            </div>
        </div>
    </div>

    <header class="bg-white border-b-2 border-black sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            
            <a href="/" class="flex items-center gap-2 group">
                <% if(site.logoUrl) { %>
                    <img src="<%= site.logoUrl %>" class="h-12 w-auto object-contain border-2 border-black rounded shadow-hard-sm">
                <% } else { %>
                    <span class="text-3xl font-display font-black text-black tracking-tighter uppercase italic"><%= site.name %></span>
                <% } %>
            </a>

            <div class="hidden md:block flex-1 max-w-md mx-8">
                <form action="/search" method="GET" class="relative">
                    <input type="text" name="q" placeholder="BUSCAR PRODUCTOS..." class="w-full bg-gray-50 border-2 border-black py-2.5 pl-4 pr-10 font-bold text-sm focus:outline-none focus:ring-0 focus:bg-white placeholder-gray-400 font-display uppercase">
                    <button type="submit" class="absolute right-0 top-0 h-full px-3 text-black hover:bg-brand border-l-2 border-black transition-colors">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>

            <div class="flex items-center gap-6">
                <nav class="hidden lg:flex items-center gap-6 font-bold text-sm uppercase tracking-wide">
                    <a href="/" class="hover:underline decoration-4 decoration-brand underline-offset-4">Inicio</a>
                    <a href="/search" class="hover:underline decoration-4 decoration-brand underline-offset-4">Tienda</a>
                </nav>

                <div class="flex items-center gap-3">
                    <a href="https://wa.me/<%= site.contact.whatsapp %>" target="_blank" class="hidden sm:flex items-center gap-2 bg-black text-white px-4 py-2 border-2 border-transparent font-bold text-sm hover:bg-brand hover:text-black hover:border-black transition-colors">
                        <i class="fab fa-whatsapp text-lg"></i>
                    </a>
                    
                    <button @click="mobileMenu = !mobileMenu" class="lg:hidden text-black p-2 border-2 border-black hover:bg-gray-100">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div x-show="mobileMenu" class="fixed inset-0 z-50 bg-white" style="display: none;">
        <div class="p-4 border-b-2 border-black flex justify-between items-center bg-gray-50">
            <span class="font-black text-xl font-display uppercase">Menú</span>
            <button @click="mobileMenu = false" class="border-2 border-black p-2 hover:bg-red-500 hover:text-white transition">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div class="p-6 flex flex-col gap-4 text-center">
            <a href="/" class="text-2xl font-black font-display uppercase hover:text-brand">Inicio</a>
            <a href="/search" class="text-2xl font-black font-display uppercase hover:text-brand">Catálogo</a>
            <a href="#footer" class="text-2xl font-black font-display uppercase hover:text-brand">Contacto</a>
            
            <hr class="border-black border-dashed my-4">
            
            <form action="/search" method="GET" class="relative">
                <input type="text" name="q" placeholder="BUSCAR..." class="w-full border-2 border-black py-3 px-4 font-bold">
            </form>

            <a href="https://wa.me/<%= site.contact.whatsapp %>" class="btn-bold w-full py-4 font-black uppercase tracking-widest flex items-center justify-center gap-2 mt-4">
                <i class="fab fa-whatsapp text-xl"></i> Chat WhatsApp
            </a>
        </div>
    </div>
</div>
