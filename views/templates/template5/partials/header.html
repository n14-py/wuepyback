<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: { 
                    sans: ['Rajdhani', 'sans-serif'],
                    mono: ['"JetBrains Mono"', 'monospace']
                },
                colors: { 
                    brand: '<%= site.primaryColor %>', 
                    cyber: '#050505',
                    panel: '#0a0f14',
                    terminal: '#0f172a'
                },
                boxShadow: {
                    'neon': '0 0 10px <%= site.primaryColor %>40, 0 0 20px <%= site.primaryColor %>20'
                }
            }
        }
    }
</script>
<style>
    body { background-color: #050505; color: #e2e8f0; background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 2px, 3px 100%; }
    .text-brand { color: <%= site.primaryColor %>; }
    .bg-brand { background-color: <%= site.primaryColor %>; }
    .border-brand { border-color: <%= site.primaryColor %>; }
    
    /* Efecto Glitch en Hover */
    .hover-glitch:hover {
        text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9;
    }
    
    /* Botón Cyber */
    .btn-cyber {
        background: transparent;
        border: 1px solid <%= site.primaryColor %>;
        color: <%= site.primaryColor %>;
        font-family: 'JetBrains Mono', monospace;
        text-transform: uppercase;
        position: relative;
        overflow: hidden;
        transition: 0.3s;
    }
    .btn-cyber:hover {
        background: <%= site.primaryColor %>;
        color: #000;
        box-shadow: 0 0 20px <%= site.primaryColor %>;
    }
    .btn-cyber::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        transition: 0.5s;
    }
    .btn-cyber:hover::before { left: 100%; }
</style>

<div x-data="{ mobileMenu: false, searchOpen: false }">
    
    <div class="bg-panel border-b border-gray-800 text-[10px] font-mono py-1 px-4 flex justify-between items-center text-gray-500 uppercase tracking-widest">
        <div class="flex gap-4">
            <span>SYS.STATUS: <span class="text-green-500 animate-pulse">ONLINE</span></span>
            <span class="hidden sm:inline">LOC: GLOBAL_NET</span>
        </div>
        <div>
            <% if(site.contact.phone) { %> <span>COMM_LINK: <%= site.contact.phone %></span> <% } %>
        </div>
    </div>

    <header class="border-b border-gray-800 bg-cyber/90 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center relative">
            
            <div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-brand"></div>
            <div class="absolute top-0 right-0 w-2 h-2 border-t border-r border-brand"></div>
            <div class="absolute bottom-0 left-0 w-2 h-2 border-b border-l border-brand"></div>
            <div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-brand"></div>

            <a href="/" class="flex items-center gap-3 group z-10">
                <% if(site.logoUrl) { %>
                    <img src="<%= site.logoUrl %>" class="h-10 border border-gray-700 p-1 bg-black">
                <% } else { %>
                    <span class="text-3xl font-bold text-white tracking-tighter uppercase font-sans"><%= site.name %><span class="text-brand animate-pulse">_</span></span>
                <% } %>
            </a>

            <div class="hidden md:block flex-1 max-w-lg mx-12">
                <form action="/search" method="GET" class="relative group">
                    <span class="absolute left-3 top-2.5 text-brand font-mono">></span>
                    <input type="text" name="q" placeholder="INPUT_SEARCH_QUERY..." class="w-full bg-panel border border-gray-700 text-brand py-2 pl-8 pr-12 font-mono text-sm focus:outline-none focus:border-brand focus:shadow-neon transition-all placeholder-gray-600 uppercase">
                    <button type="submit" class="absolute right-2 top-1.5 text-gray-500 hover:text-white"><i class="fas fa-search"></i></button>
                </form>
            </div>

            <div class="flex items-center gap-6 z-10">
                <nav class="hidden lg:flex gap-8 font-mono text-sm text-gray-400">
                    <a href="/" class="hover:text-brand hover:underline decoration-brand underline-offset-4 decoration-2">[HOME]</a>
                    <a href="/search" class="hover:text-brand hover:underline decoration-brand underline-offset-4 decoration-2">[DATABASE]</a>
                </nav>
                
                <a href="https://wa.me/<%= site.contact.whatsapp %>" target="_blank" class="hidden sm:flex items-center gap-2 text-xs font-bold bg-brand/10 text-brand border border-brand px-4 py-2 hover:bg-brand hover:text-black transition uppercase tracking-wider">
                    <i class="fab fa-whatsapp"></i> Connect
                </a>

                <button @click="mobileMenu = !mobileMenu" class="lg:hidden text-brand text-2xl">
                    <i class="fas" :class="mobileMenu ? 'fa-times' : 'fa-bars'"></i>
                </button>
            </div>
        </div>
    </header>

    <div x-show="mobileMenu" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         class="fixed inset-0 z-40 bg-cyber pt-24 px-6 font-mono text-green-500">
        
        <div class="border border-brand p-6 relative">
            <div class="absolute top-0 left-4 -translate-y-1/2 bg-cyber px-2 text-white text-xs">NAVIGATION_MENU</div>
            
            <nav class="flex flex-col gap-6 text-xl">
                <a href="/" class="hover:pl-4 transition-all duration-300 border-b border-gray-800 pb-2">> INITIALIZE_HOME</a>
                <a href="/search" class="hover:pl-4 transition-all duration-300 border-b border-gray-800 pb-2">> ACCESS_DATABASE</a>
                <a href="#footer" class="hover:pl-4 transition-all duration-300 border-b border-gray-800 pb-2">> SYSTEM_INFO</a>
                
                <form action="/search" method="GET" class="mt-4">
                    <div class="flex">
                        <span class="bg-gray-800 p-3 text-white">Find:</span>
                        <input type="text" name="q" class="bg-gray-900 w-full p-3 text-white focus:outline-none border-b border-gray-700" placeholder="...">
                    </div>
                </form>

                <a href="https://wa.me/<%= site.contact.whatsapp %>" class="btn-cyber text-center py-4 mt-4 font-bold">
                    ESTABLISH_CONNECTION
                </a>
            </nav>
        </div>
    </div>
</div>
