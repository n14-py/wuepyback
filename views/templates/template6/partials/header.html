<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: { 
                    sans: ['Quicksand', 'sans-serif'],
                    script: ['"Dancing Script"', 'cursive']
                },
                colors: { 
                    brand: '<%= site.primaryColor %>', 
                    rose: '#fce7f3', // Rosa pastel fondo
                    hot: '#db2777'   // Rosa fuerte
                },
                borderRadius: {
                    'xl': '1rem',
                    '2xl': '1.5rem',
                    '3xl': '2rem'
                }
            }
        }
    }
</script>
<style>
    body { background-color: #fff0f5; color: #4a4a4a; } /* Fondo Lavanda/Rosa muy suave */
    .text-brand { color: <%= site.primaryColor %>; }
    .bg-brand { background-color: <%= site.primaryColor %>; }
    
    /* Botón Glamour */
    .btn-glam {
        background: linear-gradient(45deg, <%= site.primaryColor %>, #db2777);
        color: white;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(219, 39, 119, 0.3);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        font-weight: 700;
        letter-spacing: 0.5px;
    }
    .btn-glam:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(219, 39, 119, 0.5);
    }
</style>

<div x-data="{ mobileMenu: false, searchOpen: false }">
    
    <div class="bg-gradient-to-r from-pink-400 to-rose-400 text-white text-xs font-bold py-2 text-center tracking-wide">
        💖 ¡Envío Gratis en compras mayores a $50! 💖
    </div>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-pink-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            
            <nav class="hidden md:flex gap-6 text-sm font-bold text-gray-500">
                <a href="/" class="hover:text-pink-500 transition flex items-center gap-1"><i class="fas fa-heart text-xs text-pink-300"></i> Inicio</a>
                <a href="/search" class="hover:text-pink-500 transition">Tienda</a>
                <a href="#footer" class="hover:text-pink-500 transition">Nosotros</a>
            </nav>

            <a href="/" class="text-4xl font-script font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 hover:scale-105 transition transform">
                <% if(site.logoUrl) { %>
                    <img src="<%= site.logoUrl %>" class="h-12 w-auto object-contain">
                <% } else { %>
                    <%= site.name %>
                <% } %>
            </a>

            <div class="flex items-center gap-4">
                <button @click="searchOpen = !searchOpen" class="w-10 h-10 rounded-full bg-pink-50 text-pink-500 hover:bg-pink-100 flex items-center justify-center transition">
                    <i class="fas fa-search"></i>
                </button>
                
                <a href="https://wa.me/<%= site.contact.whatsapp %>" target="_blank" class="hidden sm:flex btn-glam px-6 py-2 text-sm items-center gap-2">
                    <i class="fab fa-whatsapp"></i> Chat
                </a>

                <button @click="mobileMenu = !mobileMenu" class="md:hidden text-pink-500 text-2xl">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>

        <div x-show="searchOpen" x-transition class="absolute w-full bg-white border-b-4 border-pink-200 py-6 z-40 top-20 left-0 shadow-lg">
            <div class="max-w-xl mx-auto px-6 relative">
                <form action="/search" method="GET">
                    <input type="text" name="q" placeholder="Buscar cositas lindas..." class="w-full bg-pink-50 rounded-full py-3 px-6 text-gray-700 focus:outline-none focus:ring-2 focus:ring-pink-300 border border-pink-100 placeholder-pink-300">
                    <button type="submit" class="absolute right-8 top-1/2 -translate-y-1/2 text-pink-500 font-bold">IR</button>
                </form>
            </div>
        </div>
    </header>

    <div x-show="mobileMenu" class="fixed inset-0 z-50 flex justify-end">
        <div @click="mobileMenu = false" x-show="mobileMenu" x-transition.opacity class="absolute inset-0 bg-pink-900/20 backdrop-blur-sm"></div>
        
        <div x-show="mobileMenu" x-transition:enter="transform transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0" class="relative w-72 bg-white h-full p-6 shadow-2xl rounded-l-3xl border-l-4 border-pink-200">
            <div class="flex justify-between items-center mb-8">
                <span class="font-script text-3xl text-pink-500">Menú</span>
                <button @click="mobileMenu = false" class="w-8 h-8 rounded-full bg-pink-100 text-pink-500 flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            <nav class="flex flex-col gap-4 text-lg font-bold text-gray-600">
                <a href="/" class="hover:text-pink-500 hover:pl-2 transition-all">💕 Inicio</a>
                <a href="/search" class="hover:text-pink-500 hover:pl-2 transition-all">🛍️ Catálogo</a>
                <a href="/search?category=Ofertas" class="hover:text-pink-500 hover:pl-2 transition-all">🏷️ Ofertas</a>
            </nav>
            <div class="mt-auto pt-8">
                <a href="https://wa.me/<%= site.contact.whatsapp %>" class="btn-glam w-full block text-center py-3 shadow-lg">
                    Contactar
                </a>
            </div>
        </div>
    </div>
</div>
