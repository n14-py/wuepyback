<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: { sans: ['"Space Grotesk"', 'sans-serif'] },
                colors: { brand: '<%= site.primaryColor %>', dark: '<%= site.secondaryColor %>' }
            }
        }
    }
</script>
<style>
    /* Clases dinámicas basadas en la elección del usuario */
    .text-brand { color: <%= site.primaryColor %>; }
    .bg-brand { background-color: <%= site.primaryColor %>; }
    .border-brand { border-color: <%= site.primaryColor %>; }
    .hover-bg-brand:hover { background-color: <%= site.primaryColor %>; }
    .ring-brand:focus { --tw-ring-color: <%= site.primaryColor %>; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: <%= site.primaryColor %>; }
</style>

<nav class="fixed w-full z-50 top-0 start-0 bg-slate-950/80 backdrop-blur-md border-b border-slate-800" x-data="{ mobileMenuOpen: false, searchOpen: false }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-wrap items-center justify-between h-20">
            
            <a href="/" class="flex items-center gap-3 group">
                <% if(site.logoUrl) { %>
                    <img src="<%= site.logoUrl %>" class="h-10 w-auto rounded-lg object-contain group-hover:scale-105 transition">
                <% } else { %>
                    <div class="h-10 w-10 bg-brand rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-brand/20">
                        <%= site.name.charAt(0) %>
                    </div>
                <% } %>
                <span class="text-xl font-bold text-white tracking-tight group-hover:text-brand transition"><%= site.name %></span>
            </a>

            <div class="hidden md:flex flex-1 max-w-lg mx-8">
                <form action="/search" method="GET" class="w-full relative group">
                    <input type="text" name="q" placeholder="Buscar productos..." class="w-full bg-slate-900 text-white border border-slate-700 rounded-full py-2.5 pl-5 pr-12 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition-all placeholder-slate-500 group-hover:bg-slate-800">
                    <button type="submit" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 bg-slate-700 rounded-full text-slate-300 flex items-center justify-center hover:bg-brand hover:text-white transition">
                        <i class="fas fa-search text-xs"></i>
                    </button>
                </form>
            </div>

            <div class="flex items-center gap-4">
                <button @click="searchOpen = !searchOpen" class="md:hidden text-slate-300 hover:text-white p-2">
                    <i class="fas fa-search text-lg"></i>
                </button>

                <div class="hidden md:flex items-center gap-6 text-sm font-medium text-slate-300">
                    <a href="/" class="hover:text-white transition">Inicio</a>
                    <a href="/search" class="hover:text-white transition">Catálogo</a>
                </div>

                <a href="https://wa.me/<%= site.contact.whatsapp %>" target="_blank" class="hidden sm:flex bg-brand text-white px-5 py-2.5 rounded-full font-bold shadow-lg shadow-brand/20 items-center gap-2 text-sm hover:brightness-110 transition transform hover:-translate-y-1">
                    <i class="fab fa-whatsapp text-lg"></i> <span class="hidden lg:inline">Contacto</span>
                </a>

                <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden text-slate-300 hover:text-white p-2 focus:outline-none">
                    <i class="fas" :class="mobileMenuOpen ? 'fa-times' : 'fa-bars'"></i>
                </button>
            </div>
        </div>

        <div x-show="searchOpen" x-transition class="md:hidden py-4 border-t border-slate-800">
            <form action="/search" method="GET" class="relative">
                <input type="text" name="q" placeholder="¿Qué buscas hoy?" class="w-full bg-slate-900 text-white border border-slate-700 rounded-lg py-3 pl-4 pr-12 focus:outline-none focus:ring-2 focus:ring-brand">
                <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 text-brand font-bold">IR</button>
            </form>
        </div>
    </div>

    <div x-show="mobileMenuOpen" x-transition.origin.top class="md:hidden bg-slate-900 border-b border-slate-800 absolute w-full left-0 shadow-2xl">
        <div class="px-4 pt-4 pb-6 space-y-2">
            <a href="/" class="block px-4 py-3 rounded-lg bg-slate-800 text-white font-medium border-l-4 border-brand">Inicio</a>
            <a href="/search" class="block px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition">Ver Catálogo Completo</a>
            <% if(site.social.instagram) { %>
                <a href="<%= site.social.instagram %>" target="_blank" class="block px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition"><i class="fab fa-instagram mr-2"></i> Instagram</a>
            <% } %>
            <div class="pt-4 mt-4 border-t border-slate-800">
                <a href="https://wa.me/<%= site.contact.whatsapp %>" class="flex w-full items-center justify-center gap-2 bg-green-600 text-white py-3 rounded-lg font-bold">
                    <i class="fab fa-whatsapp text-lg"></i> Hablar por WhatsApp
                </a>
            </div>
        </div>
    </div>
</nav>
<div class="h-20"></div>
