<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

<script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: { 
                    sans: ['Lato', 'sans-serif'],
                    serif: ['"Playfair Display"', 'serif']
                },
                colors: { 
                    brand: '<%= site.primaryColor %>', 
                    accent: '<%= site.secondaryColor %>',
                    soft: '#f9f7f2', // Fondo crema suave
                    paper: '#ffffff'
                },
                borderRadius: {
                    '4xl': '2.5rem'
                },
                boxShadow: {
                    'soft': '0 10px 40px -10px rgba(0,0,0,0.05)'
                }
            }
        }
    }
</script>
<style>
    body { background-color: #f9f7f2; color: #4a4a4a; }
    .text-brand { color: <%= site.primaryColor %>; }
    .bg-brand { background-color: <%= site.primaryColor %>; }
    .border-brand { border-color: <%= site.primaryColor %>; }
    
    /* Botón Suave Personalizado */
    .btn-soft {
        background-color: <%= site.primaryColor %>;
        color: white;
        border-radius: 9999px;
        padding: 0.75rem 2rem;
        font-family: 'Lato', sans-serif;
        font-weight: bold;
        letter-spacing: 0.05em;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px <%= site.primaryColor %>40;
    }
    .btn-soft:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px <%= site.primaryColor %>60;
    }
</style>

<div x-data="{ mobileMenu: false, searchOpen: false }">
    
    <div class="bg-brand/10 text-brand text-xs font-bold py-3 text-center tracking-widest uppercase border-b border-brand/5">
        <span class="inline-block animate-pulse">✨</span> Envíos gratis en compras mayores a $50 <span class="inline-block animate-pulse">✨</span>
    </div>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-stone-100 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 h-24 flex justify-between items-center">
            
            <nav class="hidden md:flex gap-8 text-sm font-bold uppercase tracking-widest text-stone-500">
                <a href="/" class="hover:text-brand transition relative group">
                    Inicio
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-brand transition-all group-hover:w-full"></span>
                </a>
                <a href="/search" class="hover:text-brand transition relative group">
                    Colección
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-brand transition-all group-hover:w-full"></span>
                </a>
                <a href="#footer" class="hover:text-brand transition relative group">
                    Contacto
                    <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-brand transition-all group-hover:w-full"></span>
                </a>
            </nav>

            <a href="/" class="text-3xl lg:text-4xl font-serif font-bold text-stone-800 italic hover:opacity-80 transition transform hover:scale-105 absolute left-1/2 -translate-x-1/2">
                <% if(site.logoUrl) { %>
                    <img src="<%= site.logoUrl %>" class="h-16 w-auto object-contain">
                <% } else { %>
                    <%= site.name %>
                <% } %>
            </a>

            <div class="flex items-center gap-6 ml-auto">
                <button @click="searchOpen = !searchOpen" class="text-stone-400 hover:text-brand transition">
                    <i class="fas fa-search text-xl"></i>
                </button>
                
                <a href="https://wa.me/<%= site.contact.whatsapp %>" target="_blank" class="hidden sm:flex items-center gap-2 text-stone-400 hover:text-green-600 transition group">
                    <span class="text-xs font-bold uppercase hidden lg:block group-hover:text-stone-600">Ayuda</span>
                    <i class="fab fa-whatsapp text-2xl"></i>
                </a>

                <button @click="mobileMenu = !mobileMenu" class="md:hidden text-stone-600 p-2">
                    <i class="fas fa-bars text-2xl"></i>
                </button>
            </div>
        </div>

        <div x-show="searchOpen" x-transition.opacity class="absolute w-full bg-white border-b border-stone-100 py-8 z-40 shadow-soft">
            <div class="max-w-3xl mx-auto px-6 relative">
                <form action="/search" method="GET">
                    <input type="text" name="q" placeholder="¿Qué estás buscando hoy?" class="w-full border-b-2 border-stone-200 py-4 text-2xl font-serif text-center focus:outline-none focus:border-brand bg-transparent placeholder-stone-300 text-stone-700 italic">
                </form>
                <button @click="searchOpen = false" class="absolute right-0 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600"><i class="fas fa-times text-xl"></i></button>
            </div>
        </div>
    </header>

    <div x-show="mobileMenu" class="fixed inset-0 z-50 flex justify-end">
        <div @click="mobileMenu = false" x-show="mobileMenu" x-transition.opacity class="absolute inset-0 bg-stone-900/20 backdrop-blur-sm"></div>
        
        <div x-show="mobileMenu" x-transition:enter="transform transition ease-out duration-500" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0" class="relative w-80 bg-[#fbf9f4] h-full p-10 rounded-l-[3rem] shadow-2xl flex flex-col border-l border-white">
            
            <div class="flex justify-between items-center mb-12">
                <span class="font-serif italic text-2xl text-stone-800">Menú</span>
                <button @click="mobileMenu = false" class="text-stone-400 hover:text-brand"><i class="fas fa-times text-2xl"></i></button>
            </div>

            <nav class="space-y-8 text-center flex-1">
                <a href="/" class="block text-2xl font-serif text-stone-800 hover:text-brand hover:italic transition">Inicio</a>
                <a href="/search" class="block text-2xl font-serif text-stone-800 hover:text-brand hover:italic transition">Catálogo</a>
                <a href="#footer" class="block text-2xl font-serif text-stone-800 hover:text-brand hover:italic transition">Contacto</a>
                <a href="/search?category=Ofertas" class="block text-2xl font-serif text-brand italic font-bold">Ofertas</a>
            </nav>

            <div class="mt-auto">
                <p class="text-center text-xs text-stone-400 mb-4 uppercase tracking-widest">Síguenos</p>
                <div class="flex justify-center gap-6 text-stone-400 mb-8">
                    <i class="fab fa-instagram text-xl"></i>
                    <i class="fab fa-facebook text-xl"></i>
                    <i class="fab fa-tiktok text-xl"></i>
                </div>
                <a href="https://wa.me/<%= site.contact.whatsapp %>" class="btn-soft block w-full text-center">
                    <i class="fab fa-whatsapp mr-2"></i> WhatsApp
                </a>
            </div>
        </div>
    </div>
</div>
